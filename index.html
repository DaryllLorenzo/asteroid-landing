    <!-- Script para GitHub stars (mejorado) -->
    <script>
      async function fetchAndSetStars() {
        const el = document.getElementById('github-stars');
        if (!el) return false;
        try {
          const res = await fetch('https://api.github.com/repos/DaryllLorenzo/asteroid');
          if (!res.ok) throw new Error();
          const data = await res.json();
          el.textContent = (data.stargazers_count ?? 0).toLocaleString();
        } catch {
          el.textContent = '0';
        }
        return true;
      }
    
      // Reintenta cada 200ms hasta encontrar el elemento (máx 10s)
      const interval = setInterval(async () => {
        const done = await fetchAndSetStars();
        if (done) clearInterval(interval);
      }, 200);
      setTimeout(() => clearInterval(interval), 10000);
    </script>
